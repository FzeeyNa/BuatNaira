<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Flowers for Naira</title>
  <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        font-family: 'Poppins', sans-serif;
    }
    .container {
        position: relative;
        width: 100vw;
        height: 100vh;
    }
    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }
    .title {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        color: #ffb3eb;
        text-shadow: 0 0 10px #ff6beb, 0 0 20px #ff6beb;
        font-size: 2rem;
        z-index: 10;
        pointer-events: none;
        animation: floatMessage 3s ease-in-out infinite;
    }
    #screenshot {
        top: auto;
        bottom: 5%;
        padding: 10px 20px;
        font-size: 1.2rem;
        background-color: rgba(255, 107, 235, 0.2);
        border: 2px solid #ff6beb;
        border-radius: 30px;
        color: #ffb3eb;
        cursor: pointer;
        pointer-events: auto;
        transition: all 0.3s;
    }
    #screenshot:hover {
        background-color: rgba(255, 107, 235, 0.5);
        box-shadow: 0 0 15px #ff6beb;
    }
    @keyframes floatMessage {
        0%, 100% {
            transform: translateX(-50%) translateY(0);
        }
        50% {
            transform: translateX(-50%) translateY(-15px);
        }
    }
  </style>

</head>
<body>
<div class="container">
    <canvas id="canvas"></canvas>
    <div class="title">Bunga Cantik Untuk Naira 🌸</div>
    <div class="title" style="top: 15%; font-size: 1rem; opacity: 0.8;">Gerakkan kursor/sentuh layar untuk menggambar bunga</div>
    <button class="title" id="screenshot" type="button">Save Picture...</button>
    <audio autoplay loop src="./Jesse Barrera & Albert Posis _Unaware_ (Official Music Video)_fUAhDL9-w1o.mp3"></audio>
</div>

<script type="x-shader/x-fragment" id="fragmentShader">
    #define PI 3.14159265359

    uniform float u_ratio;
    uniform float u_moving;
    uniform float u_stop_time;
    uniform float u_speed;
    uniform vec2 u_stop_randomizer;
    uniform float u_clean;
    uniform vec2 u_point;
    uniform sampler2D u_texture;
    varying vec2 vUv;

    float rand(vec2 n) {
        return fract(sin(dot(n, vec2(12.9898, 4.1414))) * 43758.5453);
    }
    float noise(vec2 n) {
        const vec2 d = vec2(0.0, 1.0);
        vec2 b = floor(n), f = smoothstep(vec2(0.0), vec2(1.0), fract(n));
        return mix(mix(rand(b), rand(b + d.yx), f.x), mix(rand(b + d.xy), rand(b + d.yy), f.x), f.y);
    }

    float flower_shape(vec2 _point, float _size, float _outline, float _tickniess, float _noise, float _angle_offset) {
        float random_by_uv = noise(vUv);

        float petals_thickness = .5;
        float petals_number = 5. + floor(u_stop_randomizer[0] * 4.);
        float angle_animated_offset = .7 * (random_by_uv - .5) / (.2 + 30. * u_stop_time);
        float flower_angle = atan(_point.y, _point.x) - angle_animated_offset;
        float flower_sectoral_shape = abs(sin(flower_angle * .5 * petals_number + _angle_offset)) + _tickniess * petals_thickness;

        vec2 flower_size_range = vec2(4., 18.);
        float flower_radial_shape = length(_point) * (flower_size_range[0] + flower_size_range[1] * u_stop_randomizer[0]);
        float radius_noise = sin(flower_angle * 13. + 15. * random_by_uv);
        flower_radial_shape += _noise * radius_noise;

        float flower_radius_grow = min(20000. * u_stop_time, 1.);
        flower_radius_grow = 1. / flower_radius_grow;

        float flower_shape = 1. - smoothstep(0., _size * flower_sectoral_shape, _outline * flower_radius_grow * flower_radial_shape);
        flower_shape *= (1. - u_moving);

        flower_shape *= (1. - step(1., u_stop_time));

        return flower_shape;
    }

    void main() {

        vec3 base = texture2D(u_texture, vUv).xyz;
        vec2 cursor = vUv - u_point.xy;
        cursor.x *= u_ratio;

        // ========================================
        // STEM

        vec3 stem_color = vec3(0., 2., 2.);
        float stem_radius = .005 * u_speed * u_moving;
        float stem_shape = 1. - pow(smoothstep(0., stem_radius, dot(cursor, cursor)), .03);
        vec3 stem = stem_shape * stem_color;

        // ========================================
        // FLOWER

        // flower_shape:
        // - center
        // - size coefficient
        // - bright outline width
        // - extra sectoral weight
        // - noise power
        // - angle offset

        vec3 flower_color = vec3(.7 + u_stop_randomizer[1], .8 * u_stop_randomizer[1], 2.9 + u_stop_randomizer[0] * .6);

        // Adjusting colors to be more pink/romantic based on original shader
        // Original shader produces bluish/purplish, we will leave as is because it depends on randomizer and might look good.
        // Or we can boost the red component to make it more pink:
        vec3 romantic_color = vec3(
            1.2 + u_stop_randomizer[1], 
            0.5 * u_stop_randomizer[1], 
            1.5 + u_stop_randomizer[0] * .6
        );

        vec3 flower_new = romantic_color * flower_shape(cursor, 1., .96, 1., .15, 0.);
        vec3 flower_mask = 1. - vec3(flower_shape(cursor, 1.05, 1.07, 1., .15, 0.));
        vec3 flower_mid = vec3(-.6) * flower_shape(cursor, .15, 1., 2., .1, 1.9);

        vec3 color = base * flower_mask + (flower_new + flower_mid + stem);
        color *= u_clean;
        color = clamp(color, vec3(.0, .0, .15), vec3(1., 1., .4));

        gl_FragColor = vec4(color, 1.);
    }

</script>

<script type="x-shader/x-vertex" id="vertexShader">
    varying vec2 vUv;

    void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.);
    }
</script>

</html>
